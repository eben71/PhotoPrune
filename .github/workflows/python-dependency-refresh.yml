name: Python Dependency Refresh

on:
  workflow_dispatch:
  schedule:
    # Runs Tuesday 09:00 Australia/Perth, before Wednesday Dependabot updates.
    - cron: '0 1 * * 2'

permissions:
  contents: write
  pull-requests: write

env:
  UV_PROJECT_ENV: .venv
  UV_VERSION: '0.7.22'

jobs:
  refresh-python-locks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip "uv==${UV_VERSION}"

      - name: Refresh Python locks
        run: make python-locks-upgrade

      - name: Detect lock changes
        id: changes
        run: |
          if git diff --quiet -- \
            apps/api/uv.lock apps/api/requirements.lock apps/api/requirements-dev.lock \
            apps/worker/uv.lock apps/worker/requirements.lock apps/worker/requirements-dev.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update refresh PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: automation/python-lock-refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add apps/api/uv.lock apps/api/requirements.lock apps/api/requirements-dev.lock \
            apps/worker/uv.lock apps/worker/requirements.lock apps/worker/requirements-dev.lock
          git commit -m "deps: refresh python lock files"
          git push --force-with-lease origin "$BRANCH_NAME"

          if gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number' | grep -q '[0-9]'; then
            echo "Python lock refresh PR already exists."
          else
            gh pr create \
              --head "$BRANCH_NAME" \
              --base main \
              --title "deps: refresh python lock files" \
              --body "Automated weekly refresh of API and worker Python lock files before Dependabot opens dependency update PRs."
          fi
