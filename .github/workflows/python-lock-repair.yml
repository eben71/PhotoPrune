name: Python Lock Repair

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/api/pyproject.toml'
      - 'apps/worker/pyproject.toml'

permissions:
  contents: write
  pull-requests: write

env:
  UV_PROJECT_ENV: .venv
  UV_VERSION: '0.7.22'

concurrency:
  group: python-lock-repair-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  report-python-lock-repair-blocker:
    if: github.event.pull_request.head.repo.full_name != github.repository || github.event.pull_request.head.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Report repair blocker
        run: |
          {
            echo "## Python lock repair skipped"
            echo ""
            echo "This pull request changes a Python manifest, but the workflow cannot safely push lock-file repairs."
            echo ""
            echo "Reason:"
            echo "- Fork pull requests and protected-head branches are non-mutating."
            echo ""
            echo "Local repair commands:"
            echo "- \`make python-locks\`"
            echo "- \`make python-locks-check\`"
            echo ""
            echo "Commit the updated \`apps/api\` and \`apps/worker\` lock files to this PR branch."
          } >> "$GITHUB_STEP_SUMMARY"

  repair-python-locks:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref != 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: python -m pip install --upgrade pip "uv==${UV_VERSION}"

      - name: Repair Python locks
        run: make python-locks

      - name: Detect repaired locks
        id: changes
        run: |
          if git diff --quiet -- \
            apps/api/uv.lock apps/api/requirements.lock apps/api/requirements-dev.lock \
            apps/worker/uv.lock apps/worker/requirements.lock apps/worker/requirements-dev.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit repaired locks
        if: steps.changes.outputs.changed == 'true'
        env:
          BRANCH_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/uv.lock apps/api/requirements.lock apps/api/requirements-dev.lock \
            apps/worker/uv.lock apps/worker/requirements.lock apps/worker/requirements-dev.lock
          git commit -m "deps: repair python lock files"
          git push origin "HEAD:${BRANCH_REF}"
