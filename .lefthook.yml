pre-commit:
  parallel: true
  commands:
    block-sensitive-paths:
      run: |
        scripts/block-sensitive-paths.sh
    web-format:
      run: |
        sh scripts/run-pnpm.sh --filter web format:check
    api-format:
      run: |
        cd apps/api && UV_CACHE_DIR=../../.uv-cache uv run --no-project --with black==26.5.1 black --check app tests
    worker-format:
      run: |
        cd apps/worker && UV_CACHE_DIR=../../.uv-cache uv run --no-project --with black==26.5.1 black --check app tests
    python-lock-pins:
      run: |
        UV_CACHE_DIR=.uv-cache uv run python scripts/check-python-lock-pins.py
    python-locks-locked:
      run: |
        cd apps/api && UV_CACHE_DIR=../../.uv-cache uv lock --locked
        cd ../worker && UV_CACHE_DIR=../../.uv-cache uv lock --locked
