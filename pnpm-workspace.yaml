packages:
  - apps/*
  - packages/*
  - docs

overrides:
  next: 16.2.6
  postcss: 8.5.14
  rollup: 4.59.0

onlyBuiltDependencies:
  - esbuild
  - lefthook
  - sharp
  - unrs-resolver

allowBuilds:
  esbuild: true
  lefthook: true
  sharp: true
  unrs-resolver: true

# Keep pnpm's supply-chain delay explicit. The dependency preflight checks
# lockfile publish times before the expensive CI gate and tells maintainers
# when a too-new package can be refreshed safely.
minimumReleaseAge: 1440
