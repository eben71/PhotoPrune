packages:
  - apps/*
  - packages/*
  - docs

overrides:
  next: 16.2.11
  postcss: 8.5.14
  rollup: 4.59.0
  sharp: 0.35.0

onlyBuiltDependencies:
  - esbuild
  - lefthook
  - sharp
  - unrs-resolver

allowBuilds:
  esbuild: true
  lefthook: true
  sharp: true
  unrs-resolver: true

# Keep pnpm's supply-chain delay explicit. The dependency preflight checks
# lockfile publish times before the expensive CI gate and tells maintainers
# when a too-new package can be refreshed safely.
minimumReleaseAge: 1440

# Temporary exception for the already-pinned Turborepo 2.10.2 toolchain
# entries committed before PP-021 enabled the early preflight. Remove this
# block after the branch has been refreshed outside the release-age window.
minimumReleaseAgeExclude:
  - turbo
  - '@turbo/darwin-64'
  - '@turbo/darwin-arm64'
  - '@turbo/linux-64'
  - '@turbo/linux-arm64'
  - '@turbo/windows-64'
  - '@turbo/windows-arm64'
