packages:
  - apps/*
  - packages/*
  - docs

overrides:
  next: 16.2.6
  postcss: 8.5.14
  rollup: 4.59.0

onlyBuiltDependencies:
  - esbuild
  - lefthook
  - sharp
  - unrs-resolver

allowBuilds:
  esbuild: true
  lefthook: true
  sharp: true
  unrs-resolver: true

# Keep pnpm 11's default 24-hour minimum release age active, but allow
# the repo's direct Turborepo toolchain update and its platform binaries that
# are already pinned in pnpm-lock.yaml. Remove these entries after the next
# dependency refresh once the pinned release is outside the policy window.
minimumReleaseAgeExclude:
  - turbo
  - '@turbo/darwin-64'
  - '@turbo/darwin-arm64'
  - '@turbo/linux-64'
  - '@turbo/linux-arm64'
  - '@turbo/windows-64'
  - '@turbo/windows-arm64'
